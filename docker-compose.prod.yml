# ThreatScope Production Docker Compose
# Optimized for single-server deployment with resource limits and security hardening
#
# Usage:
#   1. cp .env.production.example .env
#   2. Edit .env with your API keys
#   3. docker compose -f docker-compose.prod.yml up -d
#
# Architecture:
#   nginx:80 -> frontend (static) + backend:8000 (API)
#   backend -> ghidra:8000 (reverse engineering) + diec:8000 (file identification)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3

services:
  # ==========================================================================
  # Nginx Reverse Proxy - Unified Entry Point
  # ==========================================================================
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    image: threatscope/nginx:${IMAGE_TAG:-latest}
    container_name: threatscope_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx-security.conf:/etc/nginx/snippets/security.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - threatscope-frontend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # Frontend - React SPA served by Nginx
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ""
    image: threatscope/frontend:${IMAGE_TAG:-latest}
    container_name: threatscope_frontend
    networks:
      - threatscope-frontend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 16M
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost/ || exit 1"]
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # Backend API - FastAPI Application
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: threatscope/backend:${IMAGE_TAG:-latest}
    container_name: threatscope_backend
    volumes:
      - threatscope_data:/app/data
      - ./rules:/app/rules:ro
      - ./prompts:/app/prompts:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Core settings
      - THREATSCOPE_ENVIRONMENT=production
      - THREATSCOPE_DEBUG=false
      - THREATSCOPE_DB_PATH=/app/data/tasks.db
      - THREATSCOPE_GHIDRA_SERVICE_MODE=subprocess
      - THREATSCOPE_GHIDRA_SERVICE_HOST=ghidra
      - THREATSCOPE_GHIDRA_BASE_HTTP_PORT=8000
      - THREATSCOPE_DIEC_URL=http://diec:8000
      - THREATSCOPE_DIEC_ENABLED=true
      # Analysis settings
      - THREATSCOPE_CAPA_RULES_PATH=/app/rules/capa
      - THREATSCOPE_ANALYSIS_DEFAULT_TIMEOUT=${ANALYSIS_TIMEOUT:-300}
      # API Keys (from .env)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      # Optional: Observability
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
    depends_on:
      ghidra:
        condition: service_healthy
      diec:
        condition: service_healthy
    networks:
      - threatscope-frontend
      - threatscope-backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    group_add:
      - ${DOCKER_GID:-999}

  # ==========================================================================
  # Ghidra Analysis Service - Reverse Engineering
  # ==========================================================================
  ghidra:
    build:
      context: .
      dockerfile: docker/Dockerfile.ghidra
    image: threatscope/ghidra:${IMAGE_TAG:-latest}
    container_name: threatscope_ghidra
    volumes:
      - threatscope_data:/app/data
    environment:
      - GHIDRA_INSTALL_DIR=/ghidra
      - GHIDRA_HTTP_PORT=8000
      - GHIDRA_HTTP_URL=http://localhost:8000
      - GHIDRA_UPLOAD_DIR=/app/data/uploads
      - GHIDRA_MCP_ALLOW_ORIGINS=*
      # JVM tuning for container
      - JAVA_OPTS=-Xms512m -Xmx3g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    networks:
      - threatscope-backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      start_period: 120s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ==========================================================================
  # DIEC File Type Identification Service
  # ==========================================================================
  diec:
    build:
      context: .
      dockerfile: docker/Dockerfile.diec
    image: threatscope/diec:${IMAGE_TAG:-latest}
    container_name: threatscope_diec
    environment:
      - DIEC_TIMEOUT=${DIEC_TIMEOUT:-60}
    networks:
      - threatscope-backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      start_period: 10s
    security_opt:
      - no-new-privileges:true

# =============================================================================
# Networks - Isolated frontend/backend
# =============================================================================
networks:
  threatscope-frontend:
    driver: bridge
    name: threatscope-frontend
  threatscope-backend:
    driver: bridge
    internal: true  # No external access - backend services only
    name: threatscope-backend

# =============================================================================
# Volumes
# =============================================================================
volumes:
  threatscope_data:
    driver: local
    name: threatscope_data
