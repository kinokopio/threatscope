version: "3.9"

services:
  # Ghidra analysis service (HTTP + MCP)
  ghidra:
    build:
      context: .
      dockerfile: docker/Dockerfile.ghidra
    container_name: threatscope_ghidra
    ports:
      - "127.0.0.1:8000:8000"  # HTTP API
      - "127.0.0.1:9000:9000"  # MCP Server
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/projects:/app/data/projects
    environment:
      - GHIDRA_INSTALL_DIR=/ghidra
      - GHIDRA_HTTP_PORT=8000
      - GHIDRA_MCP_PORT=9000
      - GHIDRA_HTTP_URL=http://localhost:8000
      - GHIDRA_MCP_ALLOW_ORIGINS=*
    mem_limit: 4g
    restart: unless-stopped

  # Backend API service
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: threatscope_backend
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - THREATSCOPE_GHIDRA_URL=http://ghidra:8000
      - THREATSCOPE_MCP_URL=http://ghidra:9000/mcp
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - ghidra
    restart: unless-stopped

volumes:
  data:
