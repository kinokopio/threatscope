# ThreatScope Docker Compose Configuration
# Production deployment with Nginx reverse proxy

services:
  # ==========================================================================
  # Nginx Reverse Proxy - Unified Entry Point
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: threatscope_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - threatscope
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # Frontend - React SPA served by Nginx
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: /api
    container_name: threatscope_frontend
    networks:
      - threatscope
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # Backend API - FastAPI Application
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: threatscope_backend
    volumes:
      - threatscope_data:/app/data
      - ./rules:/app/rules:ro
      - ./prompts:/app/prompts:ro
    environment:
      - THREATSCOPE_ENVIRONMENT=production
      - THREATSCOPE_GHIDRA_SERVICE_MODE=docker
      - THREATSCOPE_GHIDRA_SERVICE_HOST=ghidra
      - THREATSCOPE_GHIDRA_BASE_HTTP_PORT=8000
      - THREATSCOPE_DIEC_URL=http://diec:8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
    depends_on:
      ghidra:
        condition: service_healthy
      diec:
        condition: service_healthy
    networks:
      - threatscope
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # Ghidra Analysis Service
  # ==========================================================================
  ghidra:
    build:
      context: .
      dockerfile: docker/Dockerfile.ghidra
    container_name: threatscope_ghidra
    volumes:
      - threatscope_data:/app/data
    environment:
      - GHIDRA_INSTALL_DIR=/ghidra
      - GHIDRA_HTTP_PORT=8000
      - GHIDRA_HTTP_URL=http://localhost:8000
      - GHIDRA_MCP_ALLOW_ORIGINS=*
    mem_limit: 4g
    networks:
      - threatscope
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # DIEC File Type Identification Service
  # ==========================================================================
  diec:
    build:
      context: .
      dockerfile: docker/Dockerfile.diec
    container_name: threatscope_diec
    volumes:
      - threatscope_data:/data:ro
    environment:
      - DIEC_TIMEOUT=30
    networks:
      - threatscope
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# =============================================================================
# Networks
# =============================================================================
networks:
  threatscope:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  threatscope_data:
    driver: local
