# ELF Quick Triage Workflow
# Fast analysis for initial threat assessment

name: elf_quick_triage
description: Quick triage workflow for rapid threat assessment
version: "1.0.0"

metadata:
  author: ThreatScope
  file_types: [elf]
  estimated_time: 60  # seconds

parallel_groups:
  - [hash_calc, string_extract, elf_parse]
  - [yara_scan, malwarebazaar]

steps:
  # Stage 1: Basic Info (Parallel)
  - id: hash_calc
    name: Calculate Hashes
    tool: hash_calculator
    params:
      file_path: $file_path
    timeout: 30

  - id: string_extract
    name: Extract Strings
    tool: string_extractor
    params:
      file_path: $file_path
      min_length: 6
    timeout: 30

  - id: elf_parse
    name: Parse ELF
    tool: elf_parser
    params:
      file_path: $file_path
    timeout: 30

  # Stage 2: Quick Checks (Parallel)
  - id: yara_scan
    name: YARA Scan
    tool: yara_scanner
    params:
      file_path: $file_path
    depends_on: [hash_calc]
    timeout: 60

  - id: malwarebazaar
    name: MalwareBazaar Check
    tool: threat_intel
    params:
      service: malwarebazaar
      hashes: $results.hash_calc
    depends_on: [hash_calc]
    timeout: 30
    on_error: continue

  # Stage 3: Function Classification
  - id: func_classify
    name: Classify Functions
    tool: function_classifier
    params:
      imports: $results.elf_parse.imports
    depends_on: [elf_parse]
    timeout: 30

  # Stage 4: Quick Report
  - id: quick_report
    name: Generate Triage Report
    tool: malware_agent
    params:
      static_results:
        hashes: $results.hash_calc
        strings: $results.string_extract
        elf: $results.elf_parse
        yara: $results.yara_scan
        functions: $results.func_classify
      threat_intel:
        malwarebazaar: $results.malwarebazaar
    depends_on: [yara_scan, func_classify, malwarebazaar]
    timeout: 60
