# GDB MCP service extension
# Usage: docker compose -f docker-compose.yml -f docker-compose.gdb.yml up -d
#
# Requires GDB_MCP_PATH environment variable pointing to gdb-mcp repository

services:
  backend:
    depends_on:
      gdb:
        condition: service_healthy
    environment:
      - THREATSCOPE_GDB_ENABLED=true
      - THREATSCOPE_GDB_SERVICE_MODE=sse
      - THREATSCOPE_GDB_MCP_URL=http://gdb:8081/sse

  gdb:
    build:
      context: ${GDB_MCP_PATH:?GDB_MCP_PATH is required - set to path of gdb-mcp repository}
    image: threatscope/gdb-mcp:${IMAGE_TAG:-latest}
    container_name: threatscope_gdb
    volumes:
      - threatscope_data:/app/data
    environment:
      - GDB_PATH=/usr/bin/gdb
      - GDB_MCP_LOG_LEVEL=INFO
      - GDB_MCP_MODE=sse
      - GDB_MCP_HOST=0.0.0.0
      - GDB_MCP_PORT=8081
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    networks:
      - threatscope
    restart: unless-stopped
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      start_period: 10s

  gdb-target:
    image: ubuntu:22.04
    container_name: threatscope_gdb_target
    command: ["sleep", "infinity"]
    volumes:
      - threatscope_data:/app/data
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    network_mode: "none"
    restart: unless-stopped
